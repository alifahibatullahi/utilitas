<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PowerOps — Slide Flowchart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: white; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    color: #0F1E2C;
    padding: 28px 40px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
  }
  .header { text-align: center; }
  .eyebrow {
    font-size: 14px;
    letter-spacing: 3px;
    color: #5B6B7C;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  h1 {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.15;
  }
  .subtitle {
    font-size: 17px;
    color: #5B6B7C;
    margin-top: 4px;
  }
  .chart-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .chart-wrap svg {
    width: 100% !important;
    height: 100% !important;
    max-width: 100%;
    max-height: 100%;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #5B6B7C;
  }
  .footer .legend {
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .legend-dot.red { background: #C62828; }
  .legend-dot.green { background: #2E7D32; }
  .tag {
    background: #E3F2FD;
    color: #0D47A1;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Workflow Comparison · Operations</div>
  <h1>Workflow Laporan Shift &amp; Harian — Sebelum vs Sesudah PowerOps</h1>
  <div class="subtitle">Setiap tahap dijajarkan apple-to-apple agar perbedaannya terlihat per langkah</div>
</div>

<div class="chart-wrap" id="chart"></div>

<div class="footer">
  <div class="legend">
    <span class="legend-item"><span class="legend-dot red"></span>SEBELUM PowerOps — workflow lama dengan banyak friksi</span>
    <span class="legend-item"><span class="legend-dot green"></span>SESUDAH PowerOps — lean &amp; otomatis</span>
  </div>
  <div class="tag">PowerOps · Internal Use</div>
</div>

<script>
  // Inline SVG injection happens at render time via Node script
</script>
</body>
</html>
