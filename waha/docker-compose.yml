# WAHA (WhatsApp HTTP API) — dua container = dua nomor WA terpisah.
#   waha-notif   (:3000) → reminder/notif laporan shift & harian (grup A–D), photo-bot
#   waha-publish (:3001) → publish laporan ke washift, Utilitas 2, SU 3A
#
# Kalau cukup SATU nomor untuk semua: hapus service "waha-publish" dan kosongkan
# env WAHA_*_PUBLISH di aplikasi (otomatis fallback ke nomor notif).
#
# Cara pakai:
#   1. copy .env.example -> .env, isi nilainya
#   2. docker compose up -d
#   3. scan QR per container (lihat README.md langkah 2)

services:
  waha-notif:
    image: devlikeapro/waha
    container_name: waha-notif
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./.sessions-notif:/app/.sessions   # session persist → tak perlu scan QR ulang tiap restart
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_RESTART_ALL_SESSIONS=True   # auto-restart session saat container start

  waha-publish:
    image: devlikeapro/waha
    container_name: waha-publish
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./.sessions-publish:/app/.sessions
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY_PUBLISH}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_RESTART_ALL_SESSIONS=True
